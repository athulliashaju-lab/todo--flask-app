<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
            135deg,
            #667eea,
            #764ba2
            );

        }

        .login-card{

            width:420px;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(20px);

            padding:40px;

            border-radius:25px;

            box-shadow:
            0 8px 32px rgba(0,0,0,.3);

            text-align:center;

            color:white;

        }

        h1{
            margin-bottom:10px;
            font-size:32px;
        }

        p{
            margin-bottom:30px;
            opacity:.8;
        }

        .input-box{

            margin-bottom:20px;
            position:relative;

        }

        input{

            width:100%;
            padding:15px;

            border:none;

            border-radius:12px;

            outline:none;

            font-size:15px;

        }

        .password-box span{

            position:absolute;

            right:15px;
            top:15px;

            cursor:pointer;

            color:black;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#4f46e5;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            transform:translateY(-2px);

            background:#3730a3;

        }

        a{

            display:block;

            margin-top:20px;

            color:white;

            text-decoration:none;

            opacity:.8;

        }

    </style>

</head>

<body>

<div class="login-card">

    <h1>Welcome Back 👋</h1>

    <p>Login to continue</p>

    <form method="POST">

        <div class="input-box">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        </div>

        <div class="input-box password-box">

            <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required>

            <span onclick="togglePassword()">
            👁
            </span>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/register">
    Create account
    </a>

</div>

<script>

function togglePassword(){

let x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}
else{
x.type="password";
}

}

</script>

</body>
</html>
