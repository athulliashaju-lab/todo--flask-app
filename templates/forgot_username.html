<!DOCTYPE html>
<html>
<head>

<title>Forgot Username</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:linear-gradient(
135deg,
#667eea,
#764ba2
);

}

.card{

width:420px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);

padding:40px;

border-radius:25px;

box-shadow:
0 8px 32px rgba(0,0,0,.3);

color:white;

text-align:center;

}

h2{

margin-bottom:10px;

}

p{

opacity:.8;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

outline:none;

margin-bottom:20px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#4f46e5;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

background:#3730a3;

}

a{

display:block;

margin-top:20px;

text-decoration:none;

color:white;

}

</style>

</head>

<body>

<div class="card">

<h2>Forgot Username 👤</h2>

<p>Enter your email below</p>

<input
type="email"
placeholder="Enter your email">

<button onclick="showMessage()">

Reset Password

</button>

<a href="/login">

Back to Login

</a>

</div>

<script>

function showMessage(){

alert("Username recovery feature coming soon 🚀")

}

</script>

</body>

</html>
