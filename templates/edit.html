<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="text-center">✏️ Edit Task</h2>

<form method="POST">

<input type="text" name="task" value="{{ task[1] }}" class="form-control mb-2" required>

<select name="category" class="form-select mb-2">
    <option value="Work" {% if task[2]=='Work' %}selected{% endif %}>Work</option>
    <option value="Personal" {% if task[2]=='Personal' %}selected{% endif %}>Personal</option>
    <option value="Study" {% if task[2]=='Study' %}selected{% endif %}>Study</option>
</select>

<select name="priority" class="form-select mb-2">
    <option value="High" {% if task[3]=='High' %}selected{% endif %}>High</option>
    <option value="Medium" {% if task[3]=='Medium' %}selected{% endif %}>Medium</option>
    <option value="Low" {% if task[3]=='Low' %}selected{% endif %}>Low</option>
</select>

<input type="date" name="due_date" value="{{ task[4] }}" class="form-control mb-3">

<button class="btn btn-success w-100">Update Task</button>

</form>

</div>

</body>
</html>
