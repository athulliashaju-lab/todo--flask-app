<!DOCTYPE html>
<html>
<head>

<title>Edit Task ✏️</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#667eea,
#764ba2
);

padding:20px;

}

.edit-card{

width:500px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);

padding:40px;

border-radius:25px;

box-shadow:
0 8px 32px rgba(0,0,0,.3);

color:white;

}

h1{

text-align:center;

margin-bottom:10px;

}

p{

text-align:center;

opacity:.8;

margin-bottom:25px;

}

.form-control,
.form-select{

border:none;

border-radius:12px;

padding:12px;

margin-bottom:15px;

}

.btn{

border-radius:12px;

padding:12px;

transition:.3s;

}

.btn:hover{

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="edit-card">

<h1>Edit Task ✏️</h1>

<p>Update your task details</p>

<form method="POST">

<input
type="text"
name="task"
class="form-control"
value="{{task[2]}}"
required>

<select
name="category"
class="form-select">

<option>{{task[3]}}</option>

<option>Work</option>
<option>Study</option>
<option>Personal</option>

</select>

<select
name="priority"
class="form-select">

<option>{{task[4]}}</option>

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<input
type="date"
name="due_date"
class="form-control"
value="{{task[5]}}">

<button
class="btn btn-warning w-100">

Update Task

</button>

</form>

<a href="/"
class="btn btn-light w-100 mt-3">

Back

</a>

</div>

</body>
</html>
