<!DOCTYPE html>
<html>
<head>
<title>My To-Do App 🚀</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.dark-mode{
background-color:#121212 !important;
color:white !important;
min-height:100vh;
}

.dark-mode .container{
color:white;
}

.dark-mode .card,
.dark-mode .list-group-item,
.dark-mode .form-control,
.dark-mode .form-select{

background-color:#2d2d2d !important;
color:white !important;
border:1px solid #444;

}

.dark-mode input::placeholder{
color:#bbb;
}

.dark-mode h1,
.dark-mode h2,
.dark-mode h5,
.dark-mode p,
.dark-mode small,
.dark-mode strong{

color:white !important;

}

</style>

</head>

<body id="body" class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h1>My To-Do App 🚀</h1>

<div>

<button
onclick="toggleMode()"
class="btn btn-secondary">

🌙 / ☀️

</button>

<a href="/logout"
class="btn btn-dark">

Logout 🚪

</a>

</div>

</div>

<div class="row mb-4">

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total</h5>
<h2>{{ total }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Completed</h5>
<h2>{{ completed }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Pending</h5>
<h2>{{ total-completed }}</h2>
</div>
</div>
</div>

</div>

<div class="progress mb-3">
<div class="progress-bar"
style="width:{{progress}}%">
{{progress}}%
</div>
</div>

<input
type="text"
id="searchBox"
class="form-control mb-3"
placeholder="🔍 Search..."
onkeyup="searchTasks()">

<form method="POST" action="/add" class="row g-2 mb-4">

<div class="col-md-3">
<input
type="text"
name="task"
class="form-control"
required>
</div>

<div class="col-md-2">
<select
name="category"
class="form-select">

<option>Work</option>
<option>Personal</option>
<option>Study</option>

</select>
</div>

<div class="col-md-2">
<select
name="priority"
class="form-select">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>
</div>

<div class="col-md-3">
<input
type="date"
name="due_date"
class="form-control">
</div>

<div class="col-md-2">
<button
class="btn btn-success w-100">
Add
</button>
</div>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item mb-2">

<div class="d-flex justify-content-between">

<div>

{% if task[6]==1 %}
<strike>{{task[2]}}</strike>
{% else %}
<strong>{{task[2]}}</strong>
{% endif %}

<br>

<small>

{{task[3]}}
|
{{task[4]}}
|
📅 {{task[5]}}

</small>

</div>

<div>

<a href="{{url_for('done',id=task[0])}}" class="btn btn-success btn-sm">✔</a>

<a href="{{url_for('edit',id=task[0])}}" class="btn btn-warning btn-sm">✏️</a>

<a href="{{url_for('delete',id=task[0])}}" class="btn btn-danger btn-sm">❌</a>

</div>

</div>

</li>

{% endfor %}

</ul>

</div>

<script>

function toggleMode(){

document.body.classList.toggle(
"dark-mode"
)

}

function searchTasks(){

let input=
document.getElementById(
"searchBox"
).value.toLowerCase()

let items=
document.querySelectorAll(
".list-group-item"
)

items.forEach(item=>{

item.style.display=
item.innerText
.toLowerCase()
.includes(input)

? "block"

: "none"

})

}

</script>

</body>
</html>
