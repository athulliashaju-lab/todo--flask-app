<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">📝 My To-Do App</h2>

        <form method="POST" action="/add" class="d-flex gap-2">
            <input type="text" name="task" class="form-control" placeholder="Enter new task..." required>
            <button class="btn btn-success">Add</button>
        </form>

        <ul class="list-group mt-4">

            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">

                <div class="w-100">

                    {% if task[2] == 1 %}
                        <del>{{ task[1] }}</del>
                    {% else %}
                        {{ task[1] }}
                    {% endif %}

                    <form method="POST" action="/edit/{{ task[0] }}" class="d-flex mt-2 gap-2">
                        <input type="text" name="task" class="form-control form-control-sm" placeholder="Edit task">
                        <button class="btn btn-warning btn-sm">Edit</button>
                    </form>

                </div>

                <div class="ms-3">
                    <a href="/done/{{ task[0] }}" class="btn btn-sm btn-primary">✔</a>
                    <a href="/delete/{{ task[0] }}" class="btn btn-sm btn-danger">❌</a>
                </div>

            </li>
            {% endfor %}

        </ul>

    </div>

</div>

</body>
</html>
